<fieldset class="radio-group">
  <legend>Options</legend>
  <div class="flex flex-col gap-xs">
    <label class="field" data-orientation="horizontal">
      <input class="radio" type="radio" name="radio-options-example" value="option-1" />
      <span class="field__label">Option 1</span>
    </label>
    <label class="field" data-orientation="horizontal">
      <input class="radio" type="radio" name="radio-options-example" value="option-2" checked />
      <span class="field__label">Option 2</span>
    </label>
    <label class="field" data-orientation="horizontal">
      <input class="radio" type="radio" name="radio-options-example" value="option-3" />
      <span class="field__label">Option 3</span>
    </label>
  </div>
</fieldset>
