<div class="toggle-group" role="group" aria-label="Text formatting">
  <label class="toggle">
    <input type="checkbox" name="format" value="bold" checked />
    <span>Bold</span>
  </label>
  <label class="toggle">
    <input type="checkbox" name="format" value="italic" />
    <span>Italic</span>
  </label>
  <label class="toggle">
    <input type="checkbox" name="format" value="underline" checked />
    <span>Underline</span>
  </label>
</div>
