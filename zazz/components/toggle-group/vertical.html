<div class="toggle-group" data-orientation="vertical" role="group" aria-label="Map layer">
  <label class="toggle">
    <input type="radio" name="layer" value="map" checked />
    <span>Map</span>
  </label>
  <label class="toggle">
    <input type="radio" name="layer" value="satellite" />
    <span>Satellite</span>
  </label>
  <label class="toggle">
    <input type="radio" name="layer" value="terrain" />
    <span>Terrain</span>
  </label>
</div>
