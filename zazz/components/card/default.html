<a class="grid cursor-pointer" href="#">
  <div class="grid gap-sm bg-card text-card-foreground rounded-md shadow-sm overflow-clip">
    <figure class="grid aspect-landscape rounded-t-md overflow-clip">
      <img
        class="size-full object-cover hover:scale-105 hover:opacity-75 transition"
        width="300"
        height="200"
        loading="lazy"
        src="https://images.unsplash.com/photo-1564760055775-d63b17a55c44?auto=format&fit=crop&w=300&h=200&q=60"
        alt="Elephants crossing a dusty riverbed"
      />
    </figure>
    <div class="grid gap-sm px-sm pb-sm">
      <header class="grid gap-xs">
        <div class="flex items-center gap-xs">
          <span class="badge" data-variant="muted">Research</span>
        </div>
        <hgroup class="grid">
          <h3 class="text-md font-heading">Migration patterns</h3>
          <p class="text-sm text-muted-foreground line-clamp-2">
            Satellite collars reveal ancient routes herds still follow each dry season across the
            floodplain.
          </p>
        </hgroup>
      </header>
      <footer class="grid justify-start gap-sm pt-sm border-t">
        <div class="flex items-center gap-xs">
          <figure class="grid grid-area-pile border size-lg rounded-full overflow-clip" role="img">
            <img
              class="size-full object-cover order-last bg-transparent"
              width="64"
              height="64"
              loading="lazy"
              src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=facearea&facepad=2&w=64&h=64&q=90"
              alt="John Doe"
              aria-hidden="true"
            />
            <figcaption
              class="order-first size-full bg-primary text-primary-foreground flex items-center justify-center text-center text-md font-strong"
            >
              <span class="sr-only">John Doe</span>
              <span aria-hidden="true">JD</span>
            </figcaption>
          </figure>
          <div class="flex flex-col">
            <span class="text-sm font-strong leading-none">John Doe</span>
            <span class="text-xs text-muted-foreground">Founder, ACME Inc.</span>
          </div>
        </div>
